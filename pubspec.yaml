name: network_diagnostic_dashboard
description: A Flutter dashboard for network diagnostics — scanning, analysis and reporting.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '^3.12.0'

dependencies:
  flutter:
    sdk: flutter

  # Exécution de commandes système (utilisé dans scan.dart)
  process: ^5.0.2

  # Icônes Material (utilisé dans main.dart)
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true